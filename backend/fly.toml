# Fly.io deployment config for RAG-Arena backend
# Deploy with: flyctl deploy --config backend/fly.toml

app = "rag-arena-backend"
primary_region = "iad"      # US East — closest to Supabase's default AWS us-east-1

[build]
  # Fly.io will detect the Dockerfile automatically

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false   # keep warm — no cold starts
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"       # free tier: 3 shared-cpu-1x VMs allowed
  memory = "256mb"

[env]
  APP_ENV = "production"
  PORT = "8000"
